<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelas - Iniciar Sesión</title>
    <link rel="icon" href="kelas.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: var(--color-bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .login-logo img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
        }

        .login-logo span {
            color: var(--color-primary);
        }

        .login-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--color-text);
        }

        .login-card .form-group {
            margin-bottom: 20px;
        }

        .login-card .btn-primary {
            width: 100%;
            padding: 10px;
            font-size: 0.92rem;
        }

        .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.82rem;
            color: var(--color-text-muted);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="kelas.jpg" alt="Kelas">
            Kelas<span>.</span>
        </div>
        <div class="login-title">Iniciar Sesión</div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">Ingresar</button>
        <div class="login-footer">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</body>

</html>
